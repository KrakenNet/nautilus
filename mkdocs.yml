site_name: Nautilus
site_description: Policy-first data broker for AI agents
site_url: https://krakennet.github.io/nautilus
repo_url: https://github.com/KrakenNet/nautilus
repo_name: KrakenNet/nautilus

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [., packages/nautilus-adapter-sdk/src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source

extra:
  version:
    provider: mike
    default: latest
    alias: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - How-to Guides:
      - Overview: how-to/index.md
      - Operator Guide: how-to/operator-guide.md
      - Authoring Rules: how-to/authoring-rules.md
      - Developing Adapters: how-to/developing-adapters.md
      - Add a Postgres Source: how-to/add-a-postgres-source.md
      - Write a Routing Rule: how-to/write-a-routing-rule.md
      - Configure Attestation: how-to/configure-attestation.md
      - Verify a Token: how-to/verify-a-token.md
      - Add an LLM Source: how-to/add-an-llm-source.md
      - Monitor with Grafana: how-to/monitor-with-grafana.md
  - Concepts:
      - Overview: concepts/index.md
      - Architecture: concepts/architecture.md
      - The Attestation Chain: concepts/attestation-chain.md
      - RKM Rule Lifecycle: concepts/rkm-lifecycle.md
  - Reference:
      - Overview: reference/index.md
      - Python SDK: reference/python-sdk.md
      - REST API: reference/rest-api.md
      - CLI: reference/cli.md
      - Rule Packs: reference/rule-packs.md
      - Adapter SDK: reference/adapter-sdk.md
      - Adapter SDK Docs:
          - Overview: sdk/docs/index.md
          - Tutorial: sdk/docs/tutorial.md
          - Discovery: sdk/docs/discovery.md
          - Protocol: sdk/docs/reference/protocol.md
          - Types: sdk/docs/reference/types.md
          - Testing: sdk/docs/reference/testing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
