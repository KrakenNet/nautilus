name: pypi-publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  id-token: write

jobs:
  # ci.yml runs lint + unit tests on every push to main and every PR; tags
  # are pushed after merge, so the merge commit has already passed CI.
  # Re-running the suite here just adds a second failure surface for the
  # same merge — packaging regressions are surfaced by ``uv build`` below
  # and by twine inside the publish action.
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Clean old artifacts
        run: rm -rf dist/

      - name: Build
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
