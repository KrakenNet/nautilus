name: docs

on:
  pull_request:
    paths:
      - "nautilus/**"
      - "docs/**"
      - "CHANGELOG.md"
      - "mkdocs.yml"
      - "Makefile"
      - "scripts/**"
      - ".github/workflows/docs.yml"
  push:
    branches: [main]

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      - name: Install deps
        run: uv sync --extra docs

      - name: Build (strict)
        run: uv run mkdocs build --strict
