name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"

      # ``--all-extras`` so pyright sees the optional LLM providers
      # (anthropic, openai) and OTel/docs deps. Without them, pyright
      # ``strict = ["nautilus"]`` fails with reportMissingImports on
      # ``nautilus/analysis/llm/{anthropic,local}_provider.py`` even
      # though those modules guard their imports at runtime.
      - name: Install deps
        run: uv sync --all-extras

      - name: Version sync
        run: uv run python scripts/check_version_sync.py

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run pytest -m unit --tb=short -q
