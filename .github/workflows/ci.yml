name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # True ``code`` when a PR changes anything that isn't pure documentation, so the
  # required ``test`` job can skip on docs-only PRs (a skipped required check counts
  # as a pass). Negation-only failure mode is safe: if dorny ever ignored the ``!``
  # patterns, ``**`` matches everything → ``code`` stays true → test runs anyway.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!docs/**'
              - '!mkdocs.yml'
              - '!LICENSE'

  test:
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13", "3.14"]
        # macOS leg catches cross-platform regressions in the unit suite
        # (``pytest -m unit`` needs no Docker, so it runs everywhere).
        include:
          - os: macos-latest
            python-version: "3.13"
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      # ``--all-extras`` so pyright sees the optional LLM providers
      # (anthropic, openai) and OTel/docs deps. Without them, pyright
      # ``strict = ["nautilus"]`` fails with reportMissingImports on
      # ``nautilus/analysis/llm/{anthropic,local}_provider.py`` even
      # though those modules guard their imports at runtime.
      - name: Install deps
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run pyright

      - name: Test
        run: uv run pytest -m unit --tb=short --cov-report=xml -q

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
