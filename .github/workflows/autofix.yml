# Bot that auto-applies ruff fixes + formatting to PRs (incl. fork PRs) via the
# autofix.ci GitHub App, instead of failing the build on style. Install the
# autofix.ci app on the KrakenNet org once for this to push commits back.
# ruff is pinned to match .pre-commit-config.yaml (0.11.9).
name: autofix.ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - name: ruff fix + format
        run: |
          uvx ruff@0.11.9 check --fix-only .
          uvx ruff@0.11.9 format .
      - uses: autofix-ci/action@v1.3.2
