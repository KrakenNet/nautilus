name: Bug Report
description: Report a bug in Nautilus
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the form below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Configure nautilus.yaml with ...
        2. Run `broker.request(...)`
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened, including any error messages or tracebacks.
    validations:
      required: true
  - type: dropdown
    id: adapter
    attributes:
      label: Adapter
      description: Which adapter is involved (if applicable)?
      options:
        - PostgreSQL
        - PgVector
        - Elasticsearch
        - Neo4j
        - REST
        - ServiceNow
        - InfluxDB
        - S3
        - Custom (via Adapter SDK)
        - Not applicable
    validations:
      required: false
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      description: Which transport are you using?
      options:
        - Python library (sync)
        - Python library (async)
        - REST API
        - MCP
        - CLI
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Nautilus Version
      description: Output of `nautilus version` or `pip show nautilus-rkm`
      placeholder: "0.1.1"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Output of `python --version`
      placeholder: "3.14.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Ubuntu 24.04 / macOS 15 / Windows 11"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant logs or tracebacks.
      render: shell
    validations:
      required: false
